name: Verify

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      # Runs typecheck + lint (incl. the Tailwind token/typography guardrails,
      # which now fail on raw palette colors and bare font sizes) + tests +
      # prettier --check. See eslint.config.mjs and docs/DESIGN_TOKENS.md.
      # `next build` is intentionally omitted here: it requires runtime env
      # (BASE_API_HOSTNAME, Clerk keys) that isn't available in CI. Add it once
      # those secrets are provisioned to also catch RSC boundary breaks.
      - run: yarn verify
